<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <button type="button" class="langtoggle" data-lang-toggle>Français</button>
      <a href="index.html" data-i18n="nav.public">← View public leaderboard</a>
    </div>

    <header class="page">
      <h1><span class="star">★</span> Team ExO <span class="star">★</span></h1>
      <br>
    </header>

    <!-- ── Sign-in ──────────────────────────────────────────────────── -->
    <div class="card" id="loginCard">
      <label for="email" data-i18n="label.email">Admin email</label>
      <input type="email" id="email" data-i18n-ph="ph.email" placeholder="you@example.com" autocomplete="username" />
      <label for="password" data-i18n="label.password">Admin password</label>
      <input type="password" id="password" data-i18n-ph="ph.password" placeholder="Enter password" autocomplete="current-password" />
      <button id="loginBtn" data-i18n="btn.signin">Sign in</button>
      <div class="msg err" id="loginMsg"></div>
    </div>

    <!-- ── Award stars ──────────────────────────────────────────────── -->
    <div class="card" id="adminCard" style="display:none">
      <div class="bar">
        <h2 data-i18n="admin.award">Award stars</h2>
        <button class="ghost" id="logoutBtn" style="width:auto;margin:0;padding:8px 14px" data-i18n="btn.signout">Sign out</button>
      </div>

      <div class="row">
        <div>
          <label for="name" data-i18n="label.name">Skater name</label>
          <input type="text" id="name" data-i18n-ph="ph.name" placeholder="Name" autocomplete="off" list="skaterNames" />
          <datalist id="skaterNames"></datalist>
        </div>
        <div>
          <label data-i18n="label.stars">Stars to add</label>
          <div class="stepper">
            <button type="button" id="starsMinus" aria-label="−10">−</button>
            <span id="starsValue">10</span>
            <button type="button" id="starsPlus" aria-label="+10">+</button>
          </div>
        </div>
      </div>
      <p class="hint" data-i18n="admin.hint">If the skater is already on the list, these stars are added to their total.</p>
      <button id="addBtn" class="button-43" data-i18n="btn.add">Add stars</button>
      <div class="msg" id="addMsg"></div>
    </div>

    <!-- ── Current standings (admin reference) ──────────────────────── -->
    <div class="card" id="listCard" style="display:none">
      <div class="bar"><h2 data-i18n="admin.standings">Current standings</h2></div>
      <table>
        <thead>
          <tr><th data-i18n="th.rank">#</th><th data-i18n="th.skater">Skater</th><th style="text-align:right" data-i18n="th.stars">Stars</th><th></th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script>
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginCard = document.getElementById("loginCard");
    const adminCard = document.getElementById("adminCard");
    const listCard = document.getElementById("listCard");
    const loginMsg = document.getElementById("loginMsg");
    const addMsg = document.getElementById("addMsg");
    const rows = document.getElementById("rows");

    function msg(el, text, type) {
      el.textContent = text;
      el.className = "msg show " + type;
    }
    function clearMsg(el) { el.className = "msg"; }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    // ── Stars stepper (+/− in increments of 10) ───────────────────────
    const STEP = 10;
    const MIN_STARS = 10;
    let starsToAdd = MIN_STARS;
    const starsValue = document.getElementById("starsValue");
    function renderStars() { starsValue.textContent = starsToAdd; }
    document.getElementById("starsMinus").addEventListener("click", () => {
      starsToAdd = Math.max(MIN_STARS, starsToAdd - STEP);
      renderStars();
    });
    document.getElementById("starsPlus").addEventListener("click", () => {
      starsToAdd += STEP;
      renderStars();
    });

    // ── Auth state ────────────────────────────────────────────────────
    async function refreshUI() {
      const { data } = await db.auth.getSession();
      const signedIn = !!data.session;
      loginCard.style.display = signedIn ? "none" : "block";
      adminCard.style.display = signedIn ? "block" : "none";
      listCard.style.display = signedIn ? "block" : "none";
      if (signedIn) loadList();
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      clearMsg(loginMsg);
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email) return msg(loginMsg, t("err.email"), "err");
      if (!password) return msg(loginMsg, t("err.password"), "err");
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) return msg(loginMsg, t("err.credentials"), "err");
      document.getElementById("password").value = "";
      refreshUI();
    });

    document.getElementById("email").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("password").focus();
    });
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await db.auth.signOut();
      refreshUI();
    });

    // ── Add stars (create or add to existing total) ───────────────────
    document.getElementById("addBtn").addEventListener("click", async () => {
      clearMsg(addMsg);
      const name = document.getElementById("name").value.trim();
      const stars = starsToAdd;

      if (!name) return msg(addMsg, t("err.name"), "err");
      if (!Number.isInteger(stars) || stars < 1)
        return msg(addMsg, t("err.starnum"), "err");

      // Look for an existing skater by name (case-insensitive).
      const { data: existing, error: findErr } = await db
        .from("skaters")
        .select("id, name, stars")
        .ilike("name", name)
        .maybeSingle();

      if (findErr) {
        console.error(findErr);
        return msg(addMsg, t("err.lookup") + (findErr.message || findErr.code || "unknown error"), "err");
      }

      let error;
      if (existing) {
        ({ error } = await db
          .from("skaters")
          .update({ stars: existing.stars + stars })
          .eq("id", existing.id));
      } else {
        ({ error } = await db.from("skaters").insert({ name, stars }));
      }

      if (error) {
        console.error(error);
        return msg(addMsg, t("err.save") + (error.message || error.code || "unknown error"), "err");
      }

      const total = existing ? existing.stars + stars : stars;
      msg(
        addMsg,
        t("msg.added", { stars, name: existing ? existing.name : name, total }),
        "ok"
      );
      document.getElementById("name").value = "";
      starsToAdd = MIN_STARS;
      renderStars();
      document.getElementById("name").focus();
      loadList();
    });

    // ── Standings list with delete (admin only) ───────────────────────
    async function loadList() {
      const { data, error } = await db
        .from("skaters")
        .select("id, name, stars")
        .order("stars", { ascending: false })
        .order("name", { ascending: true });
      if (error) return;

      // Feed existing names into the autocomplete dropdown for the add form.
      document.getElementById("skaterNames").innerHTML = data
        .map((s) => `<option value="${escapeHtml(s.name)}"></option>`)
        .join("");

      if (!data.length) {
        rows.innerHTML = `<tr><td colspan="4" class="empty">${t("admin.empty")}</td></tr>`;
        return;
      }
      rows.innerHTML = data
        .map(
          (s, i) => `<tr>
            <td class="rank">${i + 1}</td>
            <td class="name">${escapeHtml(s.name)}</td>
            <td class="stars">${s.stars} ⭐</td>
            <td style="text-align:right"><button class="tiny" data-id="${s.id}" data-name="${escapeHtml(s.name)}">${t("btn.remove")}</button></td>
          </tr>`
        )
        .join("");
    }

    rows.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-id]");
      if (!btn) return;
      if (!confirm(t("confirm.remove", { name: btn.dataset.name }))) return;
      const { error } = await db.from("skaters").delete().eq("id", btn.dataset.id);
      if (error) return msg(addMsg, t("err.save") + (error.message || error.code || "unknown error"), "err");
      loadList();
    });

    initI18n();
    // The standings list is built in JS, so re-render it on language change.
    document.addEventListener("langchange", loadList);

    refreshUI();
  </script>
</body>
</html>
